  SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/kstar?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true"
  SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  USER_SERVICE_URL: "http://user-service:8081"

